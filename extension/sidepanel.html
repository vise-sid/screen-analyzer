<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixelFoxx</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 16v-4"/>
          <path d="M12 8h.01"/>
        </svg>
      </div>
      <span class="header-title">PixelFoxx</span>
    </div>
    <div class="header-right">
      <span class="model-badge">Gemini 3 Flash</span>
      <button id="newChatBtn" class="icon-btn" title="New conversation">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Log Area -->
  <main class="content" id="logArea">
    <div id="placeholder" class="placeholder">
      <div class="placeholder-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8"/>
          <path d="M12 17v4"/>
          <path d="M7 9l3 3-3 3"/>
          <line x1="13" y1="15" x2="17" y2="15"/>
        </svg>
      </div>
      <p class="placeholder-text">Give me a task and I'll control your browser to accomplish it.</p>
      <p class="placeholder-hint">e.g. "Scroll down and find the pricing section"</p>
    </div>
  </main>

  <!-- Footer / Input -->
  <footer class="footer">
    <div class="input-row">
      <input
        type="text"
        id="taskInput"
        class="task-input"
        placeholder="Describe what you want me to do..."
        autocomplete="off"
      />
      <button id="sendBtn" class="send-btn" title="Start task">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
      <button id="stopBtn" class="stop-btn hidden" title="Click: retry stuck step. Double-click: stop agent">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="6" width="12" height="12" rx="2"/>
        </svg>
      </button>
    </div>
    <p class="footer-note">Powered by Gemini. Uses CDP for browser control.</p>
  </footer>

  <script src="actions.js"></script>
  <script src="tabs.js"></script>
  <script src="cookies.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
