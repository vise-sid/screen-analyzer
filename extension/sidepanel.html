<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixelFoxx</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Sign-in overlay — shown until the user is authenticated -->
  <div id="signinOverlay" class="signin-overlay">
    <div class="signin-card">
      <div class="signin-logo">
        <img src="icons/icon128.png" alt="PixelFoxx" />
      </div>
      <h1 class="signin-title">Pixel<span>Foxx</span></h1>
      <p class="signin-sub">Sign in to start automating the web.</p>
      <button id="signinBtn" class="signin-btn">
        <svg width="16" height="16" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.7 4.7-6.2 8-11.3 8a12 12 0 1 1 0-24c3 0 5.7 1.1 7.8 3l5.7-5.7A20 20 0 1 0 44 24c0-1.2-.1-2.4-.4-3.5z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8A12 12 0 0 1 24 16c3 0 5.7 1.1 7.8 3l5.7-5.7A20 20 0 0 0 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2A11.9 11.9 0 0 1 12.7 28.4l-6.6 5.1A20 20 0 0 0 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3a12 12 0 0 1-4.1 5.6l6.2 5.2C41.9 35.7 44 30.2 44 24c0-1.2-.1-2.4-.4-3.5z"/>
        </svg>
        <span>Sign in with Google</span>
      </button>
      <p id="signinError" class="signin-error"></p>
      <p class="signin-footer">pixelfoxx.io</p>
    </div>
  </div>

  <!-- Main app shell — hidden until signed in -->
  <div id="appShell" class="app-shell hidden">
    <!-- Activity bar: pulses whenever the agent is working -->
    <div id="activityBar" class="activity-bar hidden" aria-hidden="true"></div>
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <img src="icons/icon48.png" alt="PixelFoxx" />
        </div>
        <span class="header-title">Pixel<span>Foxx</span></span>
      </div>
      <div class="header-right">
        <div id="userChip" class="user-chip hidden">
          <img id="userAvatar" class="user-avatar" alt="" />
          <span id="userName" class="user-name"></span>
          <button id="signoutBtn" class="user-signout" title="Sign out">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
        <button id="homeBtn" class="icon-btn hidden" title="Back to home">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Landing view — two big buttons, shown before a session is active -->
    <section id="landingView" class="landing-view">
      <div class="landing-inner">
        <div class="landing-icon">
          <img src="icons/icon128.png" alt="PixelFoxx" />
        </div>
        <h2 class="landing-title">What are we getting into today?</h2>
        <p class="landing-sub">Start a fresh session, or run a saved playbook.</p>
        <div class="landing-buttons">
          <button id="startSessionBtn" class="landing-btn primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <polygon points="10 8 16 12 10 16 10 8"/>
            </svg>
            <span>Start Session</span>
          </button>
          <button id="playbooksBtn" class="landing-btn secondary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
            </svg>
            <span>My Playbooks</span>
          </button>
        </div>
      </div>
    </section>

    <!-- Playbook list view — hidden until requested -->
    <section id="playbooksView" class="playbooks-view hidden">
      <div class="playbooks-header">
        <h2>My Playbooks</h2>
        <button id="playbooksBack" class="link-btn">← Back</button>
      </div>
      <div id="playbooksList" class="playbooks-list">
        <div class="playbooks-empty">No saved playbooks yet.</div>
      </div>
    </section>

    <!-- Chat session view — hidden until a session is active -->
    <section id="chatView" class="chat-view hidden">
      <div class="chat-todo-strip hidden" id="todoStrip">
        <div class="todo-strip-header">
          <span class="todo-strip-title">Plan</span>
          <span class="todo-strip-count" id="todoStripCount"></span>
        </div>
        <ul class="todo-strip-list" id="todoStripList"></ul>
      </div>

      <div class="chat-thread" id="chatThread"></div>

      <!-- Save Playbook button (shown when the agent marks session as ready_to_save) -->
      <div id="saveBanner" class="save-banner hidden">
        <span class="save-text">Playbook-worthy. Save it?</span>
        <button id="saveBtn" class="save-btn">Save Playbook</button>
      </div>

      <footer class="footer">
        <div class="input-row">
          <input
            type="text"
            id="taskInput"
            class="task-input"
            placeholder="What do you need, boss?"
            autocomplete="off"
          />
          <button id="sendBtn" class="send-btn" title="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
          <button id="stopBtn" class="stop-btn hidden" title="Pause">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="6" width="12" height="12" rx="2"/>
            </svg>
          </button>
        </div>
        <p class="footer-note">pixelfoxx.io</p>
      </footer>
    </section>
  </div>

  <script src="auth.js"></script>
  <script src="actions.js"></script>
  <script src="tabs.js"></script>
  <script src="cookies.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
