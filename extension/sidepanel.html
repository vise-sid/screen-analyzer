<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixelFoxx</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <img src="icons/icon48.png" alt="PixelFoxx" />
      </div>
      <span class="header-title">Pixel<span>Foxx</span></span>
    </div>
    <div class="header-right">
      <span class="model-badge">Gemini 3 Flash</span>
      <button id="newChatBtn" class="icon-btn" title="New conversation">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Log Area -->
  <main class="content" id="logArea">
    <div id="placeholder" class="placeholder">
      <div class="placeholder-icon">
        <img src="icons/icon128.png" style="width: 64px; height: 64px; image-rendering: pixelated; opacity: 0.7;" />
      </div>
      <p class="placeholder-text">What are we getting into today?</p>
      <p class="placeholder-hint">Try: "Book a flight from Mumbai to Delhi for May 10"</p>
    </div>
  </main>

  <!-- Footer / Input -->
  <footer class="footer">
    <div class="input-row">
      <input
        type="text"
        id="taskInput"
        class="task-input"
        placeholder="What do you need, boss?"
        autocomplete="off"
      />
      <button id="sendBtn" class="send-btn" title="Let's go">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
      <button id="stopBtn" class="stop-btn hidden" title="Click: retry. Double-click: stop.">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="6" width="12" height="12" rx="2"/>
        </svg>
      </button>
    </div>
    <p class="footer-note">pixelfoxx.io</p>
  </footer>

  <script src="actions.js"></script>
  <script src="tabs.js"></script>
  <script src="cookies.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
