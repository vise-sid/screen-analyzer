<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PixelFoxx — Design System</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="tier1-screens.jsx"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #14110E; color: #F4EFE6; font-family: 'Space Grotesk', system-ui, sans-serif; }
  body { padding: 48px; min-height: 100vh; }

  @keyframes fxPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #3A352D; }

  .ds-wrap { max-width: 1100px; margin: 0 auto; }
  .ds-h1 { font-family: 'Silkscreen', monospace; font-size: 36px; letter-spacing: 1px; margin-bottom: 8px; }
  .ds-h1 span { color: #FF6A1A; }
  .ds-tag { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #6B6357; letter-spacing: 0.5px; margin-bottom: 56px; }
  .ds-section { margin-bottom: 72px; padding-top: 20px; border-top: 1px solid #3A352D; }
  .ds-section-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px; }
  .ds-section-num { font-family: 'Silkscreen', monospace; font-size: 12px; color: #FF6A1A; letter-spacing: 1px; }
  .ds-h2 { font-family: 'Silkscreen', monospace; font-size: 20px; letter-spacing: 0.5px; }
  .ds-section-sub { font-size: 13px; color: #A89E8D; max-width: 720px; margin-bottom: 28px; line-height: 1.55; }
  .ds-h3 { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #6B6357; letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 12px; }
  .card { background: #1C1916; border: 1px solid #3A352D; padding: 20px; }
  .grid { display: grid; gap: 12px; }
  .swatch { padding: 12px; border: 1px solid #3A352D; display: flex; flex-direction: column; gap: 10px; }
  .swatch-preview { height: 52px; clip-path: polygon(0 3px, 3px 3px, 3px 0, calc(100% - 3px) 0, calc(100% - 3px) 3px, 100% 3px, 100% calc(100% - 3px), calc(100% - 3px) calc(100% - 3px), calc(100% - 3px) 100%, 3px 100%, 3px calc(100% - 3px), 0 calc(100% - 3px)); }
  .swatch-name { font-size: 12px; font-weight: 600; }
  .swatch-hex, .swatch-ref { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #6B6357; letter-spacing: 0.3px; }
  .demo-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; padding: 20px; background: #1C1916; border: 1px solid #3A352D; margin-bottom: 12px; }
  .demo-caption { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #6B6357; margin-top: 6px; }
  .token-table { width: 100%; border-collapse: collapse; }
  .token-table td { padding: 10px 12px; border-bottom: 1px solid #3A352D; font-size: 12px; vertical-align: middle; }
  .token-table td:first-child { font-family: 'JetBrains Mono', monospace; color: #FFC83D; width: 140px; }
  .token-table td:nth-child(2) { font-family: 'JetBrains Mono', monospace; color: #F4EFE6; width: 180px; }
  .token-table td:last-child { color: #A89E8D; }
  code.inline { font-family: 'JetBrains Mono', monospace; background: #24211D; padding: 2px 6px; font-size: 11px; color: #FFC83D; }
  .rule { display: flex; gap: 10px; padding: 10px 12px; background: #14110E; border-left: 3px solid #FF6A1A; font-size: 12px; color: #A89E8D; line-height: 1.5; margin-bottom: 6px; }
  .rule.no { border-left-color: #FF5A4E; }
  .rule.yes { border-left-color: #7FD46B; }
  .rule strong { color: #F4EFE6; font-weight: 600; display: block; margin-bottom: 2px; }
  .voice-quote { padding: 12px 14px; background: #14110E; border: 1px solid #3A352D; font-size: 13px; color: #F4EFE6; line-height: 1.55; margin-bottom: 8px; font-style: italic; position: relative; padding-left: 32px; }
  .voice-quote::before { content: '"'; position: absolute; left: 10px; top: 0; font-size: 34px; color: #FF6A1A; font-family: 'Silkscreen', monospace; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { FX } = window;

// ═══════════════ Helpers ═══════════════
const Section = ({ num, title, sub, children }) => (
  <section className="ds-section">
    <div className="ds-section-header">
      <div className="ds-section-num">{num}</div>
      <h2 className="ds-h2">{title}</h2>
    </div>
    {sub && <div className="ds-section-sub">{sub}</div>}
    {children}
  </section>
);

const Swatch = ({ name, hex, fxKey, dark }) => (
  <div className="swatch">
    <div className="swatch-preview" style={{ background: hex, border: hex === FX.bg || hex === FX.surface ? `1px solid ${FX.line}` : 'none' }}/>
    <div>
      <div className="swatch-name" style={{ color: dark ? FX.text : FX.text }}>{name}</div>
      <div className="swatch-ref">FX.{fxKey}</div>
      <div className="swatch-hex">{hex.toUpperCase()}</div>
    </div>
  </div>
);

const TypeSpec = ({ label, sample, font, size, weight, tracking, usage }) => (
  <div style={{ padding: 20, background: FX.surface, border: `1px solid ${FX.line}`, marginBottom: 10, display: 'flex', gap: 24, alignItems: 'flex-start' }}>
    <div style={{ flex: 1, minWidth: 0 }}>
      <div style={{ fontFamily: font, fontSize: size, fontWeight: weight, letterSpacing: tracking, color: FX.text, marginBottom: 14, lineHeight: 1.15 }}>{sample}</div>
      <div className="demo-caption">{usage}</div>
    </div>
    <div style={{ width: 200, fontFamily: FX.mono, fontSize: 10, color: FX.textMute, lineHeight: 1.8, flexShrink: 0 }}>
      <div><span style={{ color: FX.orange }}>name</span> &nbsp;{label}</div>
      <div><span style={{ color: FX.orange }}>font</span> &nbsp;{font.split(',')[0].replace(/'/g,'')}</div>
      <div><span style={{ color: FX.orange }}>size</span> &nbsp;{size}px</div>
      <div><span style={{ color: FX.orange }}>weight</span> &nbsp;{weight}</div>
      {tracking && <div><span style={{ color: FX.orange }}>track</span> &nbsp;{tracking}px</div>}
    </div>
  </div>
);

// ═══════════════ App ═══════════════
const App = () => (
  <div className="ds-wrap">
    <h1 className="ds-h1">PIXEL<span>FOXX</span> — DESIGN SYSTEM</h1>
    <div className="ds-tag">v1.1 · BROWSER AUTOMATION CO-PILOT · NICK WILDE ENERGY</div>

    {/* ═══════════════ 01 — Brand Vibe ═══════════════ */}
    <Section num="01" title="Brand Vibe" sub="Warm, dry, pixel-nostalgic. We're an AI tool that doesn't feel like one. 8-bit accents meet modern UI. Everything's a little handmade, a little cheeky, always confident.">
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
        <div className="card">
          <div className="ds-h3">Voice — Pixel Foxx</div>
          <div style={{ fontSize: 12, color: FX.textDim, lineHeight: 1.6, marginBottom: 14 }}>
            Nick Wilde, softened into a collaborator. Warm, dry, quietly clever. Speaks in lowercase, in short sentences. Uses the user's <strong style={{color: FX.text}}>first name</strong> once signed in (<code className="inline">anna</code>, lowercased). <code className="inline">partner</code> or <code className="inline">buddy</code> is the pre-auth fallback. Never "user" or "human".
          </div>
          <div className="voice-quote">well, hey there partner.</div>
          <div className="voice-quote">aight anna, running Job Hunt. i'll keep you posted.</div>
          <div className="voice-quote">okay, gmail inbox. looks like a crime scene.</div>
          <div className="voice-quote">hit a 2FA wall. house rule — i don't touch codes.</div>
        </div>
        <div className="card">
          <div className="ds-h3">Tenets</div>
          <div className="rule yes"><div><strong>Show before you tell.</strong>Narrate actions as they happen, in one short sentence.</div></div>
          <div className="rule yes"><div><strong>Honesty over confidence.</strong>If a step's unverified, say "i think so — can you confirm?"</div></div>
          <div className="rule no"><div><strong>Never narrate mechanics.</strong>Don't say "I will now invoke the click function…" — talk like a person.</div></div>
          <div className="rule no"><div><strong>Never ask for secrets.</strong>Passwords, OTPs, 2FA codes — always hand off to the user.</div></div>
        </div>
      </div>
    </Section>

    {/* ═══════════════ 02 — Colors ═══════════════ */}
    <Section num="02" title="Colors" sub="A tight 13-token palette rooted in the mascot. Near-black warm base, five surface tiers, warm off-white text, and three brand accents (orange, yellow, blue) lifted straight from the fox.">
      <div className="ds-h3">Surfaces · warm black scale</div>
      <div className="grid" style={{ gridTemplateColumns: 'repeat(6, 1fr)', marginBottom: 24 }}>
        <Swatch name="bg" hex={FX.bg} fxKey="bg" />
        <Swatch name="surface" hex={FX.surface} fxKey="surface" />
        <Swatch name="surface2" hex={FX.surface2} fxKey="surface2" />
        <Swatch name="surface3" hex={FX.surface3} fxKey="surface3" />
        <Swatch name="line" hex={FX.line} fxKey="line" />
        <Swatch name="line2" hex={FX.line2} fxKey="line2" />
      </div>

      <div className="ds-h3">Text · warm off-white</div>
      <div className="grid" style={{ gridTemplateColumns: 'repeat(3, 1fr)', marginBottom: 24 }}>
        <Swatch name="text" hex={FX.text} fxKey="text" />
        <Swatch name="textDim" hex={FX.textDim} fxKey="textDim" />
        <Swatch name="textMute" hex={FX.textMute} fxKey="textMute" />
      </div>

      <div className="ds-h3">Brand · lifted from the mascot</div>
      <div className="grid" style={{ gridTemplateColumns: 'repeat(4, 1fr)', marginBottom: 24 }}>
        <Swatch name="orange — primary" hex={FX.orange} fxKey="orange" />
        <Swatch name="orangeDk" hex={FX.orangeDk} fxKey="orangeDk" />
        <Swatch name="yellow" hex={FX.yellow} fxKey="yellow" />
        <Swatch name="blue" hex={FX.blue} fxKey="blue" />
      </div>

      <div className="ds-h3">Semantic</div>
      <div className="grid" style={{ gridTemplateColumns: 'repeat(3, 1fr)', marginBottom: 20 }}>
        <Swatch name="ok" hex={FX.ok} fxKey="ok" />
        <Swatch name="warn" hex={FX.warn} fxKey="warn" />
        <Swatch name="err" hex={FX.err} fxKey="err" />
      </div>

      <div className="card">
        <div className="ds-h3">Usage Rules</div>
        <div className="rule yes"><div><strong>Orange leads.</strong>Primary CTA, active tab, mascot accent, agent narration. Every screen has exactly one orange moment.</div></div>
        <div className="rule yes"><div><strong>Yellow warns & celebrates.</strong>Paused states, warnings, takeover moments, variables <code className="inline">{"{{like this}}"}</code>. Pick yellow OR blue as a support, never both.</div></div>
        <div className="rule yes"><div><strong>Blue for info & tips.</strong>Sparingly. User input tag. "Heads up" panels. The fox's ears.</div></div>
        <div className="rule yes"><div><strong>Semantic (ok/warn/err) is free.</strong>Green checkmarks, red errors — these don't count against the accent budget. They're status, not brand.</div></div>
        <div className="rule no"><div><strong>Never gradient-blend brand colors.</strong>Orange → yellow, orange → nothing. Surface-on-surface gradients are allowed in hero cards.</div></div>
      </div>
    </Section>

    {/* ═══════════════ 03 — Type ═══════════════ */}
    <Section num="03" title="Typography" sub="Three-family stack. Silkscreen for pixel moments & headers. Space Grotesk for all UI. JetBrains Mono for agent logs, code, timestamps, meta-info.">
      <TypeSpec label="Hero / Big Numbers" sample="847" font={FX.pixel} size={56} weight={400} tracking={1} usage="Reserved for hero moments — big number reveals, splash screens. Never body copy." />
      <TypeSpec label="Pixel H1" sample="PIXELFOXX" font={FX.pixel} size={22} weight={400} tracking={1} usage="Product logo, section titles in design system, pixel moments. Always uppercase." />
      <TypeSpec label="Pixel H2" sample="FOXX NEEDS YOU" font={FX.pixel} size={13} weight={400} tracking={0.5} usage="Modal headers, highest-attention moments. Yellow bg when paired with Safety Yellow." />
      <TypeSpec label="UI H1" sample="Job Hunt — Senior Frontend" font={FX.ui} size={13} weight={600} usage="Panel titles, playbook names. Title case, tight tracking." />
      <TypeSpec label="UI Body" sample="well, hey there partner." font={FX.ui} size={13} weight={400} usage="Foxx speech, user messages, prose. Always lowercase in Foxx's voice." />
      <TypeSpec label="UI Small" sample="i'll skim, summarize, archive the noise." font={FX.ui} size={11} weight={400} usage="Secondary copy inside cards. Line-height 1.5." />
      <TypeSpec label="Mono Label" sample="UNREAD · 847" font={FX.mono} size={10} weight={500} tracking={0.5} usage="All-caps labels, chips, timestamps. 0.5px tracking. Muted color." />
      <TypeSpec label="Mono Log" sample="14:03  OBS  scraped 47 listings" font={FX.mono} size={11} weight={400} usage="Agent log lines, terminal output. Never italicized." />

      <div className="card" style={{ marginTop: 20 }}>
        <div className="ds-h3">Rules</div>
        <div className="rule yes"><div><strong>Body minimum 11px.</strong>UI prose, chat bubbles, list items. 12–13px is the comfort zone.</div></div>
        <div className="rule yes"><div><strong>Mono labels can go to 8px.</strong>Dense meta, URL strips, status timestamps. Mono is denser than UI and stays legible smaller. Never smaller than 8px.</div></div>
        <div className="rule no"><div><strong>Never use Silkscreen for body.</strong>It's a paint, not a font. Pixel type = numbers, short labels, and short pixel-moment headers (H1/H2, modal titles). Never full sentences.</div></div>
        <div className="rule yes"><div><strong>Lowercase Foxx, Title Case UI, UPPERCASE pixel.</strong>Foxx speaks lowercase prose. Playbook names and stats are Title Case. Anything set in Silkscreen is ALL CAPS.</div></div>
      </div>
    </Section>

    {/* ═══════════════ 04 — Spacing & Shape ═══════════════ */}
    <Section num="04" title="Spacing & Shape" sub="Chunky pixel corners instead of rounded radii. 4px base grid. Clip-path does the visual work — no actual border-radius anywhere.">
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 20 }}>
        <div className="card">
          <div className="ds-h3">Pixel Corners</div>
          <div style={{ fontSize: 12, color: FX.textDim, lineHeight: 1.55, marginBottom: 14 }}>
            Every card, button, modal, chip uses <code className="inline">PIXEL_CORNERS</code> — a 3px diagonal clip-path. Gives an 8-bit "bitten" corner instead of a rounded one.
          </div>
          <div style={{ display: 'flex', gap: 10 }}>
            <div style={{ width: 80, height: 48, background: FX.orange, clipPath: 'polygon(0 3px,3px 3px,3px 0,calc(100% - 3px) 0,calc(100% - 3px) 3px,100% 3px,100% calc(100% - 3px),calc(100% - 3px) calc(100% - 3px),calc(100% - 3px) 100%,3px 100%,3px calc(100% - 3px),0 calc(100% - 3px))' }}/>
            <div style={{ width: 80, height: 48, background: FX.yellow, clipPath: 'polygon(0 3px,3px 3px,3px 0,calc(100% - 3px) 0,calc(100% - 3px) 3px,100% 3px,100% calc(100% - 3px),calc(100% - 3px) calc(100% - 3px),calc(100% - 3px) 100%,3px 100%,3px calc(100% - 3px),0 calc(100% - 3px))' }}/>
            <div style={{ width: 80, height: 48, background: FX.surface, border: `1px solid ${FX.line}`, clipPath: 'polygon(0 3px,3px 3px,3px 0,calc(100% - 3px) 0,calc(100% - 3px) 3px,100% 3px,100% calc(100% - 3px),calc(100% - 3px) calc(100% - 3px),calc(100% - 3px) 100%,3px 100%,3px calc(100% - 3px),0 calc(100% - 3px))' }}/>
          </div>
        </div>
        <div className="card">
          <div className="ds-h3">Spacing Scale (4px base)</div>
          <table className="token-table">
            <tbody>
              <tr><td>4</td><td>4px</td><td>chip gap, dense grids</td></tr>
              <tr><td>6</td><td>6px</td><td>between stacked pills</td></tr>
              <tr><td>8</td><td>8px</td><td>button icon gap, list rows</td></tr>
              <tr><td>10/12</td><td>10–12px</td><td>card padding, comfortable list</td></tr>
              <tr><td>14/16</td><td>14–16px</td><td>section gaps, modal padding</td></tr>
              <tr><td>20/24</td><td>20–24px</td><td>panel padding, hero space</td></tr>
            </tbody>
          </table>
        </div>
      </div>
      <div className="card">
        <div className="ds-h3">Panel Frame Spec</div>
        <div style={{ display: 'flex', gap: 20, alignItems: 'center' }}>
          <div style={{ width: 80, height: 148, background: FX.surface, border: `1px solid ${FX.line2}`, position: 'relative' }}>
            <div style={{ position: 'absolute', top: 6, left: 6, right: 6, height: 14, background: FX.orange, opacity: 0.3 }}/>
            <div style={{ position: 'absolute', top: 26, left: 6, right: 6, bottom: 26, background: FX.bg }}/>
            <div style={{ position: 'absolute', bottom: 6, left: 6, right: 6, height: 14, background: FX.orange, opacity: 0.3 }}/>
          </div>
          <div style={{ fontSize: 12, color: FX.textDim, lineHeight: 1.7 }}>
            <div>Width <code className="inline">400px</code> · Height <code className="inline">740px</code> — Chrome side panel.</div>
            <div>Header strip <code className="inline">48px</code> · Footer strip <code className="inline">52px</code>.</div>
            <div>Content padding <code className="inline">12–14px</code> horizontal, <code className="inline">14–20px</code> vertical.</div>
            <div>Popup: <code className="inline">320×420</code>. HUD: <code className="inline">320×80</code>.</div>
          </div>
        </div>
      </div>
    </Section>

    {/* ═══════════════ 05 — Components ═══════════════ */}
    <Section num="05" title="Components" sub="The full primitive set. Everything's in primitives.jsx — import by reference, don't re-roll.">

      <div className="ds-h3">PixelButton — 5 variants × 3 sizes</div>
      <div className="demo-row">
        <PixelButton variant="primary" icon="play">Primary</PixelButton>
        <PixelButton variant="yellow" icon="bolt">Yellow</PixelButton>
        <PixelButton variant="default" icon="folder">Default</PixelButton>
        <PixelButton variant="ghost" icon="history">Ghost</PixelButton>
        <PixelButton variant="danger" icon="close">Danger</PixelButton>
      </div>
      <div className="demo-row">
        <PixelButton variant="primary" size="sm" icon="plus">sm</PixelButton>
        <PixelButton variant="primary" size="md" icon="plus">md (default)</PixelButton>
        <PixelButton variant="primary" size="lg" icon="plus">lg</PixelButton>
      </div>

      <div className="ds-h3" style={{marginTop:20}}>Chip — mono status pill</div>
      <div className="demo-row">
        <Chip><Dot color={FX.ok}/> ON</Chip>
        <Chip color={FX.ok} bg="rgba(127,212,107,0.15)"><Dot color={FX.ok}/> DONE</Chip>
        <Chip color={FX.orange} bg="rgba(255,106,26,0.15)"><Dot color={FX.orange} pulse/> LIVE</Chip>
        <Chip color={FX.yellow} bg="rgba(255,200,61,0.15)">PAUSED</Chip>
        <Chip color={FX.err} bg="rgba(255,90,78,0.15)">ERROR</Chip>
        <Chip bg={FX.surface3} color={FX.textDim}>⌘↵</Chip>
      </div>

      <div className="ds-h3" style={{marginTop:20}}>Mascot — mood-tinted avatar</div>
      <div className="demo-row">
        <div style={{textAlign:'center'}}><Mascot size={56} mood="chill"/><div className="demo-caption">chill</div></div>
        <div style={{textAlign:'center'}}><Mascot size={56} mood="hype"/><div className="demo-caption">hype</div></div>
        <div style={{textAlign:'center'}}><Mascot size={56} mood="work"/><div className="demo-caption">work</div></div>
        <div style={{textAlign:'center'}}><Mascot size={56} mood="error"/><div className="demo-caption">error</div></div>
        <div style={{marginLeft: 20, fontSize: 11, color: FX.textMute, fontFamily: FX.mono, lineHeight: 1.7 }}>
          <div>32px — inline in chat rows</div>
          <div>40–48px — bubbles, modals</div>
          <div>52–70px — onboarding, hero moments</div>
        </div>
      </div>

      <div className="ds-h3" style={{marginTop:20}}>Icon — 21-icon pixel set (16px viewBox)</div>
      <div className="demo-row" style={{flexWrap:'wrap', gap: 16 }}>
        {['play','pause','stop','record','plus','search','chevron','down','close','check','clock','bolt','history','settings','more','cursor','tab','chain','globe','keyboard','folder','arrow','dots'].map(n => (
          <div key={n} style={{textAlign:'center', minWidth: 48}}>
            <div style={{ padding: 6, background: FX.surface2, display: 'inline-block' }}><Icon name={n} size={16} color={FX.text}/></div>
            <div className="demo-caption">{n}</div>
          </div>
        ))}
      </div>

      <div className="ds-h3" style={{marginTop:20}}>Speech Bubble — Foxx narration</div>
      <div className="demo-row">
        <div style={{ display: 'flex', gap: 10, alignItems: 'flex-start', width: '100%' }}>
          <Mascot size={40} mood="chill"/>
          <div style={{ flex: 1, background: FX.surface, border: `1px solid ${FX.line}`, padding: '10px 12px', clipPath: 'polygon(0 3px,3px 3px,3px 0,calc(100% - 3px) 0,calc(100% - 3px) 3px,100% 3px,100% calc(100% - 3px),calc(100% - 3px) calc(100% - 3px),calc(100% - 3px) 100%,3px 100%,3px calc(100% - 3px),0 calc(100% - 3px))', fontSize: 12.5, lineHeight: 1.5 }}>
            <div style={{ fontSize: 9.5, color: FX.orange, fontFamily: FX.mono, letterSpacing: 0.4, marginBottom: 4 }}>FOXX &gt;</div>
            alright partner, poking at the page now. give me a sec.
          </div>
        </div>
      </div>

      <div className="ds-h3" style={{marginTop:20}}>Variable Pill</div>
      <div className="demo-row">

      <div style={{ marginTop: 28, padding: '10px 12px', background: 'rgba(255,106,26,0.08)', border: `1px dashed ${FX.orange}`, fontFamily: FX.mono, fontSize: 10, color: FX.orange, letterSpacing: 0.4 }}>

      <div className="ds-h3" style={{marginTop:20}}>Back Header — sub-screen chrome</div>
      <div className="demo-row" style={{ flexDirection: 'column', alignItems: 'stretch' }}>

      <div className="ds-h3" style={{marginTop:20}}>Danger Row — destructive actions</div>
      <div className="demo-row" style={{ flexDirection: 'column', alignItems: 'stretch', gap: 6 }}>
        {[
          ['Clear run history', 'keeps playbooks · wipes logs', FX.textMute, FX.text],
          ['Sign out', 'see you around, anna', FX.textMute, FX.text],
          ['Delete account', 'everything goes. no coming back.', FX.err, FX.err],
        ].map(([label, sub, border, color]) => (

      <div className="ds-h3" style={{marginTop:20}}>Permission Row — site access tile</div>
      <div className="demo-row" style={{ flexDirection: 'column', alignItems: 'stretch', gap: 4 }}>
        {[
          ['linkedin.com', 12, '2m ago', 'FULL', FX.ok],
          ['amazon.com', 3, '1w ago', 'READ', FX.yellow],
          ['x.com', 2, '1w ago', 'BLOCKED', FX.err],
        ].map(([host, runs, when, level, color]) => (
          <div key={host} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '11px 12px', background: FX.surface, border: `1px solid ${FX.line}`, borderLeft: `3px solid ${color}` }}>

      <div className="ds-h3" style={{marginTop:20}}>Filter Tab Chips — list filters</div>
      <div className="demo-row">
        {[['ALL · 7', true], ['FULL · 4', false], ['READ · 2', false], ['BLOCKED · 1', false]].map(([t, active], i) => (
          <div key={i} style={{ padding: '5px 9px', background: active ? FX.orange : FX.surface2, color: active ? '#14110E' : FX.textDim, fontFamily: FX.mono, fontSize: 9.5, fontWeight: 600, letterSpacing: 0.4, clipPath: PIXEL_CORNERS }}>{t}</div>
        ))}
        <div className="demo-caption">Label · count · orange active. Use above any list with {"<20"} items.</div>
      </div>

      <div className="ds-h3" style={{marginTop:20}}>Status Strip — tinted alert banner</div>
      <div className="demo-row" style={{ flexDirection: 'column', alignItems: 'stretch', gap: 6 }}>
        {[
          ['OFFLINE · RECONNECTING…', FX.err],
          ['STUCK · 30s ON ONE STEP', FX.yellow],
          ['PAUSED · RATE LIMITED', FX.yellow],
          ['RUNNING · 4 OF 6', FX.orange],
        ].map(([text, color]) => (
          <div key={text} style={{ padding: '8px 14px', background: `${color}22`, borderTop: `1px solid ${color}`, borderBottom: `1px solid ${color}`, display: 'flex', alignItems: 'center', gap: 8, fontFamily: FX.mono, fontSize: 9.5, color, letterSpacing: 0.5 }}>
            <div style={{ width: 6, height: 6, background: color, animation: 'fxPulse 1s steps(2) infinite' }}/>{text}

        <div className="demo-caption">Tinted bg (<code className="inline">{"{color}22"}</code>) + matching 1px borders · pulsing 6px square + mono caps label. Sits directly under the header on error/stuck/running states.</div>

      <div className="ds-h3" style={{marginTop:20}}>Tech Detail Strip — selector / error code</div>
      <div className="demo-row" style={{ flexDirection: 'column', alignItems: 'stretch', gap: 6 }}>
        {[
          [FX.err, "selector: button[data-ctrl='filter-apply']"],
          [FX.yellow, '429 Too Many Requests · retry in 1:47'],
          [FX.err, 'runtime error · #a9f2b · report sent'],
        ].map(([color, text], i) => (
          <div key={i} style={{ padding: '8px 12px', background: FX.bg, border: `1px solid ${FX.line}`, fontFamily: FX.mono, fontSize: 9.5, color: FX.textMute, letterSpacing: 0.3 }}>
            <span style={{ color }}>▸</span> {text}
          </div>
        ))}
        <div className="demo-caption">Colored arrow marker + mono text on dark bg. Use once per error screen — the raw reason Foxx shares after their in-character explanation.</div>
      </div>

      <div className="ds-h3" style={{marginTop:20}}>Error Frame — full-canvas recovery layout</div>
      <div className="demo-row" style={{ alignItems: 'flex-start', gap: 16 }}>
        <div style={{ width: 260, background: FX.bg, border: `1px solid ${FX.line}`, display: 'flex', flexDirection: 'column' }}>
          {/* header */}
          <div style={{ padding: '10px 12px', background: FX.surface, borderBottom: `1px solid ${FX.line}`, display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ fontFamily: FX.pixel, fontSize: 11, letterSpacing: 0.5 }}>PIXEL<span style={{ color: FX.orange }}>FOXX</span></div>
            <div style={{ flex: 1 }}/>
            {window.UserAvatar && <window.UserAvatar size={18}/>}
          </div>
          {/* status strip */}
          <div style={{ padding: '6px 12px', background: `${FX.err}22`, borderBottom: `1px solid ${FX.err}`, fontFamily: FX.mono, fontSize: 8.5, color: FX.err, letterSpacing: 0.5, display: 'flex', alignItems: 'center', gap: 6 }}>
            <div style={{ width: 5, height: 5, background: FX.err, animation: 'fxPulse 1s steps(2) infinite' }}/>OFFLINE · RECONNECTING…
          </div>
          {/* hero */}
          <div style={{ padding: '20px 14px', textAlign: 'center' }}>
            <Mascot size={56} mood="error" style={{ marginBottom: 10 }}/>
            <div style={{ fontFamily: FX.pixel, fontSize: 11, color: FX.err, letterSpacing: 0.5, marginBottom: 8 }}>LOST THE SIGNAL</div>
            <div style={{ fontSize: 10.5, color: FX.text, lineHeight: 1.5, marginBottom: 10 }}>hey anna, your wifi took a coffee break.</div>
            <div style={{ padding: '6px 8px', background: FX.surface, border: `1px solid ${FX.line}`, textAlign: 'left', marginBottom: 8 }}>
              <div style={{ fontFamily: FX.mono, fontSize: 7.5, color: FX.textMute, letterSpacing: 0.5, marginBottom: 2 }}>LAST STEP</div>
              <div style={{ fontSize: 9.5, color: FX.textDim }}>Step 4 of 6 — ranking top matches</div>
            </div>
          </div>
          {/* actions */}
          <div style={{ padding: 10, background: FX.surface, borderTop: `1px solid ${FX.line}`, display: 'flex', flexDirection: 'column', gap: 4 }}>
            <div style={{ padding: '6px 10px', background: FX.orange, color: '#14110E', fontSize: 10, fontWeight: 600, textAlign: 'center', clipPath: PIXEL_CORNERS }}>retry now</div>
            <div style={{ padding: '6px 10px', background: 'transparent', border: `1px solid ${FX.line2}`, color: FX.textDim, fontSize: 10, textAlign: 'center', clipPath: PIXEL_CORNERS }}>save &amp; close</div>
          </div>
        </div>
        <div style={{ flex: 1, fontSize: 11.5, color: FX.textDim, lineHeight: 1.7 }}>
          <div style={{ fontFamily: FX.mono, fontSize: 10, color: FX.text, marginBottom: 8, letterSpacing: 0.4 }}>ANATOMY</div>
          <div>① Header with <strong>user avatar</strong> (anchors identity — not a logo)</div>
          <div>② <strong>Status strip</strong> — what's wrong, in one mono caps line</div>
          <div>③ <strong>Mood mascot</strong> (56–88px) — mood matches severity</div>
          <div>④ <strong>Pixel title</strong> — Foxx's caps reaction, 3–4 words</div>
          <div>⑤ <strong>Body copy</strong> — voice-in, uses first name, max 2 sentences</div>
          <div>⑥ <strong>Last step card</strong> — context so user knows what's paused</div>
          <div>⑦ <strong>Tech detail</strong> — optional raw reason (selector, code)</div>
          <div>⑧ <strong>Recovery stack</strong> — primary CTA + ghost fallback</div>
        </div>
      </div>

    </Section>

    {/* ═══════════════ 06 — Patterns ═══════════════ */}
    <Section num="06" title="Patterns & Layouts" sub="Repeating compositions. When in doubt, reach for one of these before inventing something new.">
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
        <div className="card">
          <div className="ds-h3">Panel Shell</div>
          <div style={{ fontSize: 12, color: FX.textDim, lineHeight: 1.6 }}>
            <code className="inline">header</code> (logo + actions) → <code className="inline">tab nav</code> (optional) → <code className="inline">mode switcher</code> (optional) → <code className="inline">context strip</code> (optional) → <code className="inline">scroll body</code> → <code className="inline">footer CTA</code>.
            Always fixed 400×740. Header/footer stick; body scrolls.
          </div>
        </div>
        <div className="card">
          <div className="ds-h3">Mascot Moment</div>
          <div style={{ fontSize: 12, color: FX.textDim, lineHeight: 1.6 }}>
            Mascot (40–48px) + speech bubble side-by-side. <code className="inline">FOXX &gt;</code> label in orange mono above the line. Bubble uses <code className="inline">surface</code> bg + pixel corners.
          </div>
        </div>
        <div className="card">
          <div className="ds-h3">Hero Stat Card</div>
          <div style={{ fontSize: 12, color: FX.textDim, lineHeight: 1.6 }}>
            Tiny mono label → huge pixel-font number (44–56px) → italic Foxx caption under. Orange border. Use once per screen max.
          </div>
        </div>
        <div className="card">
          <div className="ds-h3">Accent-Bordered List Row</div>
          <div style={{ fontSize: 12, color: FX.textDim, lineHeight: 1.6 }}>
            <code className="inline">surface</code> bg + <code className="inline">3px left border</code> in semantic color (type-chip matches). Drag handle, label chip, body, meta — in that order.
          </div>
        </div>
        <div className="card">
          <div className="ds-h3">Info Strip</div>
          <div style={{ fontSize: 12, color: FX.textDim, lineHeight: 1.6 }}>
            Tinted bg (<code className="inline">rgba(brand, 0.08)</code>) + 1px matching border. First word colored, rest dim. For "heads up", tips, "remember me" callouts.
          </div>
        </div>
        <div className="card">
          <div className="ds-h3">Mode Switcher Strip</div>
          <div style={{ fontSize: 12, color: FX.textDim, lineHeight: 1.6 }}>
            Horizontal row of mono-uppercase 10px labels. Active = orange bg + dark text. Placed immediately under tab nav.
          </div>
        </div>
        <div className="card">
          <div className="ds-h3">Identity Placement · NEW v1.1</div>
          <div style={{ fontSize: 12, color: FX.textDim, lineHeight: 1.6 }}>
            Avatar lives in <strong>three spots</strong>: side panel header (right slot, 22px), settings profile card (44px hero), and error-screen header (18–22px, replaces live chip). Foxx uses <strong>first name once signed in</strong> — <code className="inline">anna</code> not <code className="inline">partner</code>. Pre-auth &amp; onboarding keep the <code className="inline">partner</code> fallback.
          </div>
        </div>
        <div className="card">
          <div className="ds-h3">Error State · NEW v1.1</div>
          <div style={{ fontSize: 12, color: FX.textDim, lineHeight: 1.6 }}>
            <strong>Foxx owns the failure.</strong>Every error screen follows the Error Frame anatomy: status strip → mood mascot → pixel title → in-voice body with user's name → context card → optional tech detail → primary recovery CTA + ghost fallback. Never "Error 500 occurred." Always a recovery path.
          </div>
        </div>
      </div>
    </Section>

    {/* ═══════════════ 07 — Do / Don't ═══════════════ */}
    <Section num="07" title="Do / Don't" sub="Hard rules to keep the system tight as it scales.">
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
        <div className="card">
          <div className="ds-h3" style={{ color: FX.ok }}>✓ Do</div>
          <div className="rule yes"><div>Use <strong>orange + one support accent max</strong> (yellow OR blue). Semantic colors don't count.</div></div>
          <div className="rule yes"><div>Reach for <strong>existing primitives</strong> before writing new CSS.</div></div>
          <div className="rule yes"><div><strong>Lowercase</strong> anything Foxx says.</div></div>
          <div className="rule yes"><div>Use <strong>pixel font for numbers, short labels, and pixel-moment headers</strong> — never body.</div></div>
          <div className="rule yes"><div><strong>Mascot in live/hero moments gets a voiced line.</strong>In list/table views, silent mascot is fine.</div></div>
          <div className="rule yes"><div>Prefer <strong>clip-path pixel corners</strong> over border-radius.</div></div>
          <div className="rule yes"><div><strong>Greet by first name</strong> once signed in — lowercase, no decoration. <code className="inline">partner</code> is pre-auth only.</div></div>
          <div className="rule yes"><div><strong>Every error gets a recovery path.</strong>Primary CTA forward, ghost fallback back. Foxx owns the failure in voice.</div></div>
        </div>
        <div className="card">
          <div className="ds-h3" style={{ color: FX.err }}>✗ Don't</div>
          <div className="rule no"><div>No <strong>brand-color gradients</strong>. Subtle surface-on-surface is the one exception.</div></div>
          <div className="rule no"><div>No <strong>emoji</strong> (unless the user types them).</div></div>
          <div className="rule no"><div>No <strong>Silkscreen prose</strong>. Short labels only — never a sentence.</div></div>
          <div className="rule no"><div>No <strong>rounded corners</strong>. Use PIXEL_CORNERS.</div></div>
          <div className="rule no"><div>No <strong>three brand accents at once</strong>. Orange + one support, that's the budget.</div></div>
          <div className="rule no"><div>No <strong>generic AI tropes</strong> — sparkle icons, "✨ magic", brain emojis.</div></div>
        </div>
      </div>
    </Section>

    {/* ═══════════════ 08 — Building ═══════════════ */}
    <Section num="08" title="Building a New Screen" sub="Copy-paste checklist. Every new panel should pass this list before ship.">
      <div className="card">
        <div className="ds-h3">Recipe</div>
        <ol style={{ paddingLeft: 22, fontSize: 12.5, color: FX.textDim, lineHeight: 1.9 }}>
          <li>Start with the <code className="inline">frame</code> wrapper (400×740, FX.bg, DITHER_BG backgroundImage).</li>
          <li>Add a <strong>header strip</strong> — logo or back arrow on left, 1–2 actions on right.</li>
          <li>If it's live work, add a <strong>mascot moment</strong> in the first 120px.</li>
          <li>Main content: scroll area with <strong>12–14px horizontal padding</strong>.</li>
          <li>Break content with <strong>mono section labels</strong> (10px, textMute, uppercase, 0.5 tracking).</li>
          <li>End with a <strong>footer action row</strong> — 2–3 buttons, orange primary on the right.</li>
          <li>If the screen has a user context, <strong>place the avatar in the header right slot</strong> (22px) and use the signed-in first name in Foxx's copy.</li>
          <li>Run the <strong>color rule</strong> — orange + one support accent (yellow or blue), max. Semantic colors are free.</li>
          <li>Voice-check Foxx's lines — <strong>lowercase, short, dry</strong>.</li>
        </ol>
      </div>
    </Section>

    <div style={{ textAlign: 'center', padding: '40px 0', color: FX.textMute, fontFamily: FX.mono, fontSize: 10, letterSpacing: 0.5 }}>
      <Mascot size={44} mood="chill" style={{ margin: '0 auto 16px' }}/>
      <div>END OF DESIGN SYSTEM · v1.1</div>
      <div style={{ marginTop: 4, color: FX.line2 }}>tokens.jsx · primitives.jsx · pixel corners forever</div>
    </div>
  </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
